<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Espace — PokéChange</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FFFBF5;--white:#fff;--black:#111;--muted:#999;
  --border:rgba(0,0,0,0.07);--orange:#FF6B00;--ol:rgba(255,107,0,0.1);
  --yellow:#FFD60A;--blue:#0A84FF;--red:#FF3B30;--green:#28CD41;--purple:#7B2FFF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--black);font-family:'DM Sans',sans-serif}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(255,251,245,0.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-1px;text-decoration:none;color:var(--black)}
.logo em{color:var(--orange);font-style:normal}
.nav-links{display:flex;gap:24px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--black)}
.hamburger{display:none;background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:1.1rem;cursor:pointer}
.mobile-menu{display:none;position:fixed;top:65px;left:0;right:0;background:var(--white);border-bottom:1.5px solid var(--border);z-index:99;padding:16px 20px;flex-direction:column;gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:12px 16px;border-radius:10px;text-decoration:none;color:var(--black);font-weight:500;font-size:.9rem}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh;padding-top:65px}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:28px 20px;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
.main{padding:32px;max-width:900px}
.user-card{text-align:center;padding:20px;background:var(--bg);border-radius:16px;margin-bottom:24px}
.user-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#fff;margin:0 auto 10px}
.user-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.user-stats{display:flex;justify-content:center;gap:16px;margin-top:10px}
.ustat{text-align:center}
.ustat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--orange)}
.ustat-lbl{font-size:.65rem;color:var(--muted)}
.rep-stars{display:flex;gap:2px;justify-content:center;margin-top:6px}
.star{font-size:1rem;color:#ddd}
.star.filled{color:var(--yellow)}
.rep-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:700;margin-top:6px}
.rep-new{background:rgba(10,132,255,.1);color:#0060cc}
.rep-trusted{background:rgba(40,205,65,.1);color:#1a8a2e}
.rep-pro{background:rgba(255,184,0,.15);color:#8a6000}
.sidebar-menu{display:flex;flex-direction:column;gap:4px}
.smenu-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;cursor:pointer;font-size:.875rem;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:none;width:100%;text-align:left}
.smenu-item:hover{background:var(--bg);color:var(--black)}
.smenu-item.active{background:var(--ol);color:var(--orange);font-weight:600}
.smenu-icon{font-size:1.1rem;width:24px;text-align:center}
.smenu-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:100px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.875rem;cursor:pointer;border:none;transition:all .2s}
.btn-or{background:var(--orange);color:#fff}.btn-or:hover{background:#e05800;transform:translateY(-1px)}
.btn-ol{background:transparent;color:var(--black);border:1.5px solid var(--border)}.btn-ol:hover{background:var(--white)}
.btn-rd{background:var(--red);color:#fff}.btn-rd:hover{background:#e0301f}
.btn-gn{background:var(--green);color:#fff}.btn-gn:hover{background:#20b037}
.btn-sm{padding:7px 14px;font-size:.78rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sec-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.5px}
.sec-sub{color:var(--muted);font-size:.85rem;margin-top:4px}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:16px}
.coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.coll-item{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:10px;position:relative;transition:all .2s}
.coll-item:hover{border-color:rgba(255,107,0,.25);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.coll-item img{width:100%;aspect-ratio:3/4;object-fit:contain;border-radius:8px;background:var(--white)}
.coll-item .ci-name{font-size:.68rem;font-weight:600;margin-top:5px}
.coll-item .ci-sub{font-size:.6rem;color:var(--muted);margin-top:1px}
.coll-item .ci-cond{font-size:.6rem;color:var(--orange);font-weight:600;margin-top:2px}
.ci-del{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.55rem;cursor:pointer;display:none}
.coll-item:hover .ci-del{display:flex;align-items:center;justify-content:center}
.upload-zone{border:2px dashed rgba(255,107,0,.3);border-radius:16px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,107,0,.02)}
.upload-zone:hover{border-color:var(--orange);background:rgba(255,107,0,.04)}
.upload-zone input{display:none}
.msg-list{display:flex;flex-direction:column;gap:10px}
.msg-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s}
.msg-item:hover{border-color:rgba(255,107,0,.2);background:var(--white)}
.msg-item.unread{border-left:3px solid var(--orange);background:rgba(255,107,0,.03)}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0}
.msg-name{font-weight:600;font-size:.85rem}
.msg-preview{font-size:.75rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.msg-time{font-size:.65rem;color:var(--muted);margin-left:auto;white-space:nowrap}
.msg-card-tag{font-size:.65rem;background:var(--ol);color:var(--orange);padding:2px 7px;border-radius:100px;font-weight:600;margin-top:3px;display:inline-block}
.unread-dot{width:8px;height:8px;background:var(--orange);border-radius:50%;margin-top:6px;flex-shrink:0}
.chat-window{background:var(--white);border:1.5px solid var(--border);border-radius:18px;overflow:hidden}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-body{height:380px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:.83rem;line-height:1.5}
.bubble.mine{background:var(--orange);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bubble.theirs{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.bubble-time{font-size:.62rem;opacity:.6;margin-top:4px}
.chat-offer-card{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.2);border-radius:10px;padding:10px;margin-bottom:8px;font-size:.78rem}
.chat-input-area{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;color:var(--black)}
.chat-input:focus{border-color:var(--orange)}
.review-item{padding:14px;background:var(--bg);border-radius:12px;margin-bottom:10px}
.review-stars{display:flex;gap:2px;margin-bottom:4px}
.rev-star{color:#FFD60A;font-size:.9rem}
.review-text{font-size:.82rem;color:var(--black);margin-bottom:4px}
.review-from{font-size:.72rem;color:var(--muted)}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px}
.hist-badge{padding:4px 10px;border-radius:100px;font-size:.65rem;font-weight:700}
.hist-done{background:rgba(40,205,65,.12);color:#1a8a2e}
.hist-pending{background:rgba(255,184,0,.15);color:#8a6000}
.flag-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(255,59,48,.04);border:1px solid rgba(255,59,48,.15);border-radius:12px;margin-bottom:8px}
.flag-txt{font-size:.8rem}
.flag-count{font-size:.72rem;color:var(--red);font-weight:700}
.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,.08);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}
.ldr{display:flex;align-items:center;gap:10px;padding:32px;color:var(--muted);font-size:.875rem}
@keyframes spin{to{transform:rotate(360deg)}}
.fg{margin-bottom:14px}
.fl{display:block;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--black);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--orange)}
.fi::placeholder{color:var(--muted)}
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.ov.on{display:flex}
.modal{background:var(--white);border:1.5px solid var(--border);border-radius:22px;padding:32px;width:100%;max-width:480px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:16px}
.mcl{position:absolute;top:14px;right:14px;background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:22px;right:22px;z-index:300;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 18px;font-size:.83rem;font-weight:500;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.toast.on{transform:translateY(0);opacity:1}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.875rem}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
/* ERROR STATE */
.err-box{background:#fff5f5;border:1.5px solid rgba(255,59,48,.2);border-radius:16px;padding:28px;text-align:center;margin:32px auto;max-width:420px}
.err-box h3{font-family:'Syne',sans-serif;font-weight:800;color:var(--red);margin-bottom:10px}
.err-box p{font-size:.85rem;color:var(--muted);margin-bottom:18px;line-height:1.6}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none;position:fixed;left:0;right:0;bottom:0;top:auto;height:auto;z-index:50;border-top:1px solid var(--border);border-right:none}
  .main{padding:20px 16px}
  nav{padding:12px 16px}
  .hamburger{display:block}
  .nav-links{display:none}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:50;padding:8px 0 12px}
  .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:.6rem;color:var(--muted);font-weight:500;border:none;background:none;padding:4px}
  .bnav-item.active{color:var(--orange)}
  .bnav-icon{font-size:1.3rem}
  body{padding-bottom:70px}
}
@media(min-width:769px){.bottom-nav{display:none}}
</style>
</head>

<script>
const SUPABASE_URL = 'https://bftqdmpksokudeswkkry.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmdHFkbXBrc29rdWRlc3dra3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTUzMTcsImV4cCI6MjA5NjI5MTMxN30.wWWXC0gG-T-1GqFI2RG5W-mg4_Gsq6Yh5oWgyHvms9A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const API_KEY = 'b19ec2ee-227d-4aa6-a00b-86878529f07e';

let currentUser = null;
let currentProfile = null;
let currentSection = 'collection';
let currentChatId = null;
let chatChannel = null;

// ============ AUTH CHECK — FIXED ============
async function checkAuth() {
  try {
    // 1. Try getSession first (handles already-active sessions)
    const { data: { session }, error: sessionError } = await sb.auth.getSession();

    if (sessionError) {
      console.error('getSession error:', sessionError);
      showAuthError('Erreur de session: ' + sessionError.message);
      return;
    }

    if (!session?.user) {
      // No active session → redirect to login
      window.location.href = 'index.html';
      return;
    }

    currentUser = session.user;
    await loadProfile();

  } catch (e) {
    console.error('checkAuth exception:', e);
    showAuthError('Erreur inattendue: ' + e.message);
  }
}

async function loadProfile() {
  try {
    let { data: profile, error } = await sb.from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .maybeSingle();

    if (error) {
      console.error('profiles fetch error:', error);
      // Non-blocking: continue with a minimal profile object
      profile = null;
    }

    if (!profile) {
      // Auto-create profile for new users
      const username = currentUser.user_metadata?.username
        || currentUser.email?.split('@')[0]
        || 'Joueur';
      const { data: newProfile, error: insertError } = await sb.from('profiles')
        .insert({ id: currentUser.id, username, avatar_color: '#FF6B00' })
        .select()
        .maybeSingle();

      if (insertError) {
        console.warn('profile insert error (may already exist):', insertError);
        // Try fetching again in case of race condition
        const { data: retryProfile } = await sb.from('profiles')
          .select('*').eq('id', currentUser.id).maybeSingle();
        profile = retryProfile || { id: currentUser.id, username, avatar_color: '#FF6B00' };
      } else {
        profile = newProfile || { id: currentUser.id, username, avatar_color: '#FF6B00' };
      }
    }

    currentProfile = profile;
    initDashboard();

  } catch (e) {
    console.error('loadProfile exception:', e);
    // Still try to init with minimal data rather than leaving spinner
    currentProfile = {
      id: currentUser.id,
      username: currentUser.email?.split('@')[0] || 'Joueur',
      avatar_color: '#FF6B00'
    };
    initDashboard();
  }
}

function showAuthError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="err-box">
      <h3>Impossible de charger ton espace</h3>
      <p>${msg}<br><br>Vérifie ta connexion internet et réessaie. Si le problème persiste, déconnecte-toi et reconnecte-toi.</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-or" onclick="window.location.reload()">🔄 Réessayer</button>
        <button class="btn btn-ol" onclick="doLogout()">Déconnexion</button>
      </div>
    </div>`;
}

// Listen for auth changes (sign out, token refresh, etc.)
sb.auth.onAuthStateChange((event, session) => {
  // Only redirect on explicit sign out — INITIAL_SESSION must NOT redirect
  if (event === 'SIGNED_OUT') {
    window.location.href = 'index.html';
  }
});

// Start auth check
checkAuth();

// ============ INIT ============
async function initDashboard() {
  try {
    const color = currentProfile.avatar_color || '#FF6B00';
    const initials = (currentProfile.username || '?').slice(0, 2).toUpperCase();
    const av = document.getElementById('sideAvatar');
    const sn = document.getElementById('sideName');
    if (av) { av.textContent = initials; av.style.background = color; }
    if (sn) sn.textContent = currentProfile.username || 'Joueur';
  } catch(e) { console.error('sidebar init error:', e); }

  // Load async data in parallel, non-blocking
  loadStats();
  loadUnreadCount();

  // Show first section — this is what was missing proper error handling
  showSection('collection');

  // Realtime subscription for messages
  try {
    sb.channel('dash_msgs_' + currentUser.id)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
        loadUnreadCount();
        if (currentSection === 'messages' && !currentChatId) loadMessages();
      }).subscribe();
  } catch(e) { console.warn('realtime subscribe error:', e); }
}

async function loadStats() {
  try {
    const [echangesRes, cartesRes, reviewsRes] = await Promise.all([
      sb.from('matches').select('*', {count:'exact',head:true}).eq('responder_id', currentUser.id),
      sb.from('collection').select('*', {count:'exact',head:true}).eq('user_id', currentUser.id).eq('available', true),
      sb.from('reviews').select('rating').eq('reviewed_id', currentUser.id)
    ]);
    const echanges = echangesRes.count || 0;
    const cartes = cartesRes.count || 0;
    const reviews = reviewsRes.data || [];
    const se = document.getElementById('statEchanges');
    const sc = document.getElementById('statCartes');
    if (se) se.textContent = echanges;
    if (sc) sc.textContent = cartes;
    if (reviews.length > 0) {
      const avg = reviews.reduce((s,r) => s + r.rating, 0) / reviews.length;
      const sn = document.getElementById('statNote');
      if (sn) sn.textContent = avg.toFixed(1) + '★';
      renderStars('sideStars', avg);
      const badge = document.getElementById('sideBadge');
      if (badge) {
        if (avg >= 4.5 && reviews.length >= 5) { badge.textContent = '⭐ Pro'; badge.className = 'rep-badge rep-pro'; }
        else if (avg >= 3.5 && reviews.length >= 2) { badge.textContent = '✅ Fiable'; badge.className = 'rep-badge rep-trusted'; }
        else { badge.textContent = '🆕 Nouveau'; badge.className = 'rep-badge rep-new'; }
      }
    }
  } catch(e) { console.warn('loadStats error:', e); }
}

function renderStars(containerId, rating) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = [1,2,3,4,5].map(i =>
    `<span class="star${i <= Math.round(rating) ? ' filled' : ''}">★</span>`
  ).join('');
}

async function loadUnreadCount() {
  try {
    const {count} = await sb.from('messages')
      .select('*', {count:'exact',head:true})
      .eq('read', false)
      .neq('sender_id', currentUser.id);
    const badge = document.getElementById('msgBadge');
    if (!badge) return;
    if (count > 0) { badge.textContent = count; badge.style.display = 'flex'; }
    else badge.style.display = 'none';
  } catch(e) { console.warn('loadUnreadCount error:', e); }
}

// ============ SECTIONS ============
function showSection(name) {
  currentSection = name;
  currentChatId = null;
  try { if (chatChannel) { sb.removeChannel(chatChannel); chatChannel = null; } } catch(e) {}
  try {
    document.querySelectorAll('.smenu-item,.bnav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.smenu-item,.bnav-item').forEach(b => {
      if (b.textContent.toLowerCase().includes(sectionLabel(name))) b.classList.add('active');
    });
  } catch(e) {}
  const sections = { collection: renderCollection, messages: renderMessages, demands: renderDemands, reputation: renderReputation, history: renderHistory, profile: renderProfile };
  if (sections[name]) sections[name]();
}

function sectionLabel(n) {
  return {collection:'cartes',messages:'message',demands:'demande',reputation:'réputation',history:'historique',profile:'profil'}[n]||n;
}

let uploadRecto = null;
let uploadVerso = null;

function previewRecto(e) {
  uploadRecto = e.target.files[0];
  if (!uploadRecto) return;
  const url = URL.createObjectURL(uploadRecto);
  document.getElementById('uzRectoContent').innerHTML = `<img src="${url}" style="max-height:90px;border-radius:6px;object-fit:contain">`;
}
function previewVerso(e) {
  uploadVerso = e.target.files[0];
  if (!uploadVerso) return;
  const url = URL.createObjectURL(uploadVerso);
  document.getElementById('uzVersoContent').innerHTML = `<img src="${url}" style="max-height:90px;border-radius:6px;object-fit:contain">`;
}

async function confirmUpload() {
  const name = document.getElementById('un').value.trim();
  if (!name) { toast('Donne un nom a la carte'); return; }
  if (!uploadRecto) { toast('⚠️ Le recto est obligatoire'); return; }
  if (!uploadVerso) { toast('⚠️ Le verso est obligatoire'); return; }
  const btn = document.querySelector('#mbody .btn-or');
  if (btn) { btn.textContent = 'Upload en cours...'; btn.disabled = true; }
  try {
    const extR = uploadRecto.name.split('.').pop();
    const pathR = currentUser.id + '/recto_' + Date.now() + '.' + extR;
    const {error: errR} = await sb.storage.from('cards').upload(pathR, uploadRecto, {upsert:true});
    if (errR) { toast('Erreur upload recto: ' + errR.message); if(btn){btn.textContent='Confirmer';btn.disabled=false;} return; }
    const {data: urlR} = sb.storage.from('cards').getPublicUrl(pathR);
    const extV = uploadVerso.name.split('.').pop();
    const pathV = currentUser.id + '/verso_' + Date.now() + '.' + extV;
    const {error: errV} = await sb.storage.from('cards').upload(pathV, uploadVerso, {upsert:true});
    if (errV) { toast('Erreur upload verso: ' + errV.message); if(btn){btn.textContent='Confirmer';btn.disabled=false;} return; }
    const {data: urlV} = sb.storage.from('cards').getPublicUrl(pathV);
    const {error} = await sb.from('collection').insert({
      user_id: currentUser.id,
      name,
      number: document.getElementById('unu').value.trim(),
      set_name: document.getElementById('us').value,
      lang: document.getElementById('ul').value,
      condition: document.getElementById('uc').value,
      graded: document.getElementById('ug').value === 'Non' ? 'Non gradee' : document.getElementById('ug').value,
      grade_score: document.getElementById('ugs').value.trim(),
      img_url: urlR.publicUrl,
      img_back_url: urlV.publicUrl,
      available: true
    });
    if (error) { toast('Erreur: ' + error.message); if(btn){btn.textContent='Confirmer';btn.disabled=false;} return; }
    closeModal();
    uploadRecto = null; uploadVerso = null;
    toast('✅ Carte ajoutee avec recto et verso !');
    loadMyCollection();
  } catch(e) {
    toast('Erreur: ' + e.message);
    if(btn){btn.textContent='Confirmer';btn.disabled=false;}
  }
}

async function renderMessages() {
  setMain(`
    <div class="sec-hdr">
      <div><div class="sec-title">💬 Messages</div><div class="sec-sub">Tes conversations avec d'autres fans.</div></div>
    </div>
    <div id="msgContainer"><div class="ldr"><div class="spin"></div></div></div>
  `);
  loadMessages();
}

async function loadMessages() {
  try {
    const {data: matches} = await sb.from('matches')
      .select('*, demands(cards, user_id), profiles!matches_responder_id_fkey(username, avatar_color)')
      .or(`responder_id.eq.${currentUser.id},demands.user_id.eq.${currentUser.id}`)
      .order('created_at', {ascending:false});
    const container = document.getElementById('msgContainer');
    if (!container) return;
    if (!matches?.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">💬</div>Aucun message pour l\'instant.<br>Réponds à une demande pour commencer !</div>';
      return;
    }
    const matchIds = matches.map(m => m.id);
    const {data: lastMsgs} = await sb.from('messages').select('*').in('match_id', matchIds).order('created_at', {ascending:false});
    const msgMap = {};
    (lastMsgs||[]).forEach(m => { if(!msgMap[m.match_id]) msgMap[m.match_id] = m; });
    container.innerHTML = '<div class="msg-list">' + matches.map(m => {
      const otherUser = m.profiles;
      const lastMsg = msgMap[m.id];
      const isUnread = lastMsg && !lastMsg.read && lastMsg.sender_id !== currentUser.id;
      const cards = m.demands?.cards || [];
      const cardName = cards[0]?.name || 'Echange';
      const color = otherUser?.avatar_color || '#FF6B00';
      const initials = (otherUser?.username||'?').slice(0,2).toUpperCase();
      return `
        <div class="msg-item${isUnread?' unread':''}" onclick="openChat('${m.id}','${(otherUser?.username||'Anonyme').replace(/'/g,'')}','${color}','${cardName.replace(/'/g,'')}')">
          <div class="msg-avatar" style="background:${color}">${initials}</div>
          <div style="flex:1;min-width:0">
            <div class="msg-name">${otherUser?.username||'Anonyme'}</div>
            <span class="msg-card-tag">🃏 ${cardName}</span>
            <div class="msg-preview">${lastMsg ? lastMsg.content : 'Demarrer la conversation...'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div class="msg-time">${lastMsg ? timeAgo(lastMsg.created_at) : ''}</div>
            ${isUnread ? '<div class="unread-dot"></div>' : ''}
          </div>
        </div>`;
    }).join('') + '</div>';
  } catch(e) {
    const container = document.getElementById('msgContainer');
    if (container) container.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur: ${e.message}</div>`;
  }
}

async function openChat(matchId, username, color, cardName) {
  currentChatId = matchId;
  const initials = username.slice(0,2).toUpperCase();
  const {data: msgs} = await sb.from('messages').select('*, profiles(username)').eq('match_id', matchId).order('created_at', {ascending:true});
  await sb.from('messages').update({read:true}).eq('match_id', matchId).neq('sender_id', currentUser.id);
  loadUnreadCount();
  setMain(`
    <div style="margin-bottom:16px"><button class="btn btn-ol btn-sm" onclick="renderMessages()">← Retour</button></div>
    <div class="chat-window">
      <div class="chat-header">
        <div class="msg-avatar" style="background:${color};width:36px;height:36px">${initials}</div>
        <div><div style="font-weight:700;font-size:.9rem">${username}</div><div style="font-size:.72rem;color:var(--muted)">🃏 ${cardName}</div></div>
        <button class="btn btn-rd btn-sm" style="margin-left:auto" onclick="openReviewModal('${matchId}','${username}')">⭐ Laisser un avis</button>
        <button class="btn btn-ol btn-sm" onclick="openFlagModal('${matchId}','${username}')" style="color:var(--red)">🚩 Signaler</button>
      </div>
      <div class="chat-body" id="chatBody">
        <div class="chat-offer-card">⚡ Match trouvé pour <strong>${cardName}</strong> — Discutez des conditions d'échange !</div>
        ${(msgs||[]).map(m => `
          <div style="display:flex;flex-direction:column;${m.sender_id===currentUser.id?'align-items:flex-end':'align-items:flex-start'}">
            <div class="bubble ${m.sender_id===currentUser.id?'mine':'theirs'}">${m.content}<div class="bubble-time">${timeAgo(m.created_at)}</div></div>
          </div>`).join('')}
      </div>
      <div class="chat-input-area">
        <input class="chat-input" id="chatInp" placeholder="Ton message..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn btn-or" onclick="sendMsg()">Envoyer</button>
      </div>
    </div>
  `);
  setTimeout(() => { const b = document.getElementById('chatBody'); if(b) b.scrollTop = b.scrollHeight; }, 100);
  if (chatChannel) sb.removeChannel(chatChannel);
  chatChannel = sb.channel('chat_' + matchId)
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'messages', filter:`match_id=eq.${matchId}`},
      async payload => {
        const {data:msg} = await sb.from('messages').select('*, profiles(username)').eq('id', payload.new.id).single();
        const body = document.getElementById('chatBody');
        if (!body) return;
        const isMe = msg.sender_id === currentUser.id;
        body.innerHTML += `<div style="display:flex;flex-direction:column;${isMe?'align-items:flex-end':'align-items:flex-start'}">
          <div class="bubble ${isMe?'mine':'theirs'}">${msg.content}<div class="bubble-time">${timeAgo(msg.created_at)}</div></div>
        </div>`;
        body.scrollTop = body.scrollHeight;
        if (!isMe) { await sb.from('messages').update({read:true}).eq('id',msg.id); loadUnreadCount(); }
      }).subscribe();
}

async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const content = inp?.value.trim();
  if (!content || !currentChatId) return;
  inp.value = '';
  await sb.from('messages').insert({match_id: currentChatId, sender_id: currentUser.id, content, read: false});
}

        <div style="font-weight:700;margin-bottom:12px;color:var(--red)">🚩 Signalements reçus (${flags.length})</div>
        ${flags.map(f=>`<div class="flag-item"><div class="flag-txt">Signalé par ${f.profiles?.username||'?'} — ${f.reason||'Raison non précisée'}</div><span class="flag-count">1 flag</span></div>`).join('')}
        <div style="font-size:.75rem;color:var(--muted);margin-top:8px">3 signalements = profil marqué comme suspect</div>
      </div>` : ''}
      <div class="card">
        <div style="font-weight:700;margin-bottom:14px">Avis reçus</div>
        ${reviews?.length ? reviews.map(r=>`
          <div class="review-item">
            <div class="review-stars">${[1,2,3,4,5].map(i=>`<span class="rev-star" style="color:${i<=r.rating?'#FFD60A':'#ddd'}">★</span>`).join('')}</div>
            <div class="review-text">${r.comment||'Pas de commentaire'}</div>
            <div class="review-from">Par ${r.profiles?.username||'Anonyme'} · ${timeAgo(r.created_at)}</div>
          </div>`).join('')
        : '<div class="empty"><div class="empty-icon">⭐</div>Aucun avis encore.<br>Finalise des échanges pour recevoir des avis !</div>'}
      </div>`;
    if (avgRating) renderStars('bigStars', avgRating);
  } catch(e) {
    const cont = document.getElementById('repContent');
    if (cont) cont.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur: ${e.message}</div>`;
  }
}

// ============ HISTORY ============
async function renderHistory() {
  setMain(`
    <div class="sec-hdr">
      <div><div class="sec-title">📊 Historique</div><div class="sec-sub">Tous tes échanges réussis.</div></div>
    </div>
    <div id="histContent"><div class="ldr"><div class="spin"></div></div></div>
  `);
  try {
    const {data} = await sb.from('matches')
      .select('*, profiles!matches_responder_id_fkey(username), demands(cards)')
      .or(`responder_id.eq.${currentUser.id}`)
      .order('created_at', {ascending:false});
    const cont = document.getElementById('histContent');
    if (!cont) return;
    if (!data?.length) {
      cont.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>Aucun échange encore.<br>Réponds à des demandes pour commencer !</div>';
      return;
    }
    cont.innerHTML = '<div class="card">' + data.map(m => {
      const cards = m.demands?.cards || [];
      const cardName = cards[0]?.name || 'Carte inconnue';
      return `<div class="hist-item">
        <div style="font-size:1.5rem">🃏</div>
        <div style="flex:1"><div style="font-weight:600;font-size:.85rem">${cardName}</div><div style="font-size:.72rem;color:var(--muted)">Avec ${m.profiles?.username||'?'} · ${timeAgo(m.created_at)}</div></div>
        <span class="hist-badge hist-done">Échangé</span>
      </div>`;
    }).join('') + '</div>';
  } catch(e) {
    const cont = document.getElementById('histContent');
    if (cont) cont.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur: ${e.message}</div>`;
  }
}

// ============ PROFILE ============
async function renderProfile() {
  setMain(`
    <div class="sec-hdr">
      <div><div class="sec-title">⚙️ Mon profil</div><div class="sec-sub">Modifie tes informations.</div></div>
    </div>
    <div class="card">
      <div class="fg"><label class="fl">Pseudo</label><input class="fi" id="pUsername" value="${currentProfile?.username||''}"></div>
      <div class="fg">
        <label class="fl">Couleur de profil</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${['#FF6B00','#0A84FF','#7B2FFF','#28CD41','#FF3B30','#FFD60A','#111111'].map(c=>
            `<div onclick="selectColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c===(currentProfile?.avatar_color||'#FF6B00')?'#111':'transparent'}" data-color="${c}"></div>`
          ).join('')}
        </div>
      </div>
      <button class="btn btn-or" onclick="saveProfile()">Sauvegarder</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div style="font-weight:700;margin-bottom:12px;color:var(--red)">Zone dangereuse</div>
      <button class="btn btn-rd" onclick="doLogout()">🚪 Se déconnecter</button>
    </div>
  `);
}

let selectedColor = null;
function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('[data-color]').forEach(el => {
    el.style.border = el.dataset.color === c ? '3px solid #111' : '3px solid transparent';
  });
}

async function saveProfile() {
  const username = document.getElementById('pUsername').value.trim();
  if (!username) { toast('Pseudo requis'); return; }
  const updates = {username};
  if (selectedColor) updates.avatar_color = selectedColor;
  const {error} = await sb.from('profiles').update(updates).eq('id', currentUser.id);
  if (error) { toast('Erreur: ' + error.message); return; }
  currentProfile = {...currentProfile, ...updates};
  toast('✅ Profil mis a jour !');
  const sn = document.getElementById('sideName');
  if (sn) sn.textContent = username;
  if (selectedColor) { const av = document.getElementById('sideAvatar'); if(av) av.style.background = selectedColor; }
}

// ============ MODALS ============
function openReviewModal(matchId, username) {
  document.getElementById('mbody').innerHTML = `
    <h2>⭐ Laisser un avis</h2>
    <p style="color:var(--muted);font-size:.83rem;margin-bottom:20px">Comment s'est passé l'échange avec <strong>${username}</strong> ?</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px" id="starPicker">
      ${[1,2,3,4,5].map(i=>`<span onclick="setRating(${i})" style="font-size:2rem;cursor:pointer;color:#ddd" data-rating="${i}">★</span>`).join('')}
    </div>
    <div class="fg"><label class="fl">Commentaire (optionnel)</label><textarea class="fi" id="reviewComment" rows="3" placeholder="Decris l'echange..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-ol" onclick="closeModal()">Annuler</button>
      <button class="btn btn-or" style="flex:1" onclick="submitReview('${matchId}')">Envoyer l'avis</button>
    </div>`;
  openModal();
}

let currentRating = 0;
function setRating(r) {
  currentRating = r;
  document.querySelectorAll('#starPicker span').forEach(s => {
    s.style.color = parseInt(s.dataset.rating) <= r ? '#FFD60A' : '#ddd';
  });
}

async function submitReview(matchId) {
  if (!currentRating) { toast('Selectionne une note'); return; }
  const comment = document.getElementById('reviewComment').value.trim();
  const {data:match} = await sb.from('matches').select('*, demands(user_id)').eq('id', matchId).single();
  const reviewedId = match.responder_id === currentUser.id ? match.demands?.user_id : match.responder_id;
  const {error} = await sb.from('reviews').insert({reviewer_id: currentUser.id, reviewed_id: reviewedId, match_id: matchId, rating: currentRating, comment});
  if (error && error.code !== '23505') { toast('Erreur: ' + error.message); return; }
  closeModal();
  toast('⭐ Avis envoyé !');
  loadStats();
}

function openFlagModal(matchId, username) {
  document.getElementById('mbody').innerHTML = `
    <h2>🚩 Signaler ${username}</h2>
    <p style="color:var(--muted);font-size:.83rem;margin-bottom:16px">Ce signalement sera visible sur son profil. Utilise cette fonctionnalite de maniere responsable.</p>
    <div class="fg"><label class="fl">Raison</label>
      <select class="fi" id="flagReason">
        <option value="Carte non conforme">Carte non conforme à la description</option>
        <option value="Arnaque">Tentative d'arnaque</option>
        <option value="Non-réponse">Non-réponse après accord</option>
        <option value="Comportement inapproprié">Comportement inapproprié</option>
        <option value="Autre">Autre</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Détails</label><textarea class="fi" id="flagDetails" rows="3" placeholder="Explique la situation..."></textarea></div>
    <div style="background:rgba(255,59,48,.06);border:1px solid rgba(255,59,48,.2);border-radius:10px;padding:10px;font-size:.75rem;color:#c0251a;margin-bottom:14px">
      ⚠️ 3 signalements = profil marqué automatiquement comme suspect.
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ol" onclick="closeModal()">Annuler</button>
      <button class="btn btn-rd" style="flex:1" onclick="submitFlag()">🚩 Signaler</button>
    </div>`;
  openModal();
}

async function submitFlag() {
  toast('🚩 Signalement envoyé. Merci.');
  closeModal();
}

// ============ LIGHTBOX ============
function openCardLightbox(rectoUrl, versoUrl, name) {
  const existing = document.getElementById('cardLightbox');
  if (existing) existing.remove();
  const lb = document.createElement('div');
  lb.id = 'cardLightbox';
  lb.style.cssText = 'position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out';
  lb.innerHTML = `
    <div style="max-width:340px;width:100%;text-align:center" onclick="event.stopPropagation()">
      <button onclick="document.getElementById('cardLightbox').remove()" style="position:absolute;top:20px;right:20px;background:white;border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer">✕</button>
      <img id="lbCardImg" src="${rectoUrl}" style="width:100%;border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.8)">
      <div style="color:white;font-weight:700;margin-top:12px;font-size:1rem">${name}</div>
      ${versoUrl ? `
      <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
        <button onclick="document.getElementById('lbCardImg').src='${rectoUrl}';this.style.background='#FF6B00';this.nextElementSibling.style.background='rgba(255,255,255,.15)'" 
          style="background:#FF6B00;color:white;border:none;border-radius:100px;padding:8px 20px;font-size:.8rem;font-weight:600;cursor:pointer">Recto</button>
        <button onclick="document.getElementById('lbCardImg').src='${versoUrl}';this.style.background='#FF6B00';this.previousElementSibling.style.background='rgba(255,255,255,.15)'"
          style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:8px 20px;font-size:.8rem;font-weight:600;cursor:pointer">Verso</button>
      </div>` : '<div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:10px">Verso non disponible</div>'}
    </div>`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// ============ PUBLIC PROFILE ============
async function renderPublicProfile(userId) {
  setMain(`<div class="ldr"><div class="spin"></div>Chargement du profil...</div>`);
  try {
    const [{data: profile}, {data: reviews}, {data: cards}, {count: exchanges}] = await Promise.all([
      sb.from('profiles').select('*').eq('id', userId).maybeSingle(),
      sb.from('reviews').select('*').eq('reviewed_id', userId),
      sb.from('collection').select('*').eq('user_id', userId).eq('available', true).order('created_at', {ascending:false}),
      sb.from('matches').select('*', {count:'exact',head:true}).eq('responder_id', userId)
    ]);
    if (!profile) { setMain('<div class="empty">Profil introuvable</div>'); return; }
    const avgRating = reviews?.length ? (reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1) : null;
    const color = profile.avatar_color || '#FF6B00';
    const initials = profile.username.slice(0,2).toUpperCase();
    const badge = reviews?.length >= 5 && avgRating >= 4.5 ? '⭐ Pro' : reviews?.length >= 2 && avgRating >= 3.5 ? '✅ Fiable' : '🆕 Nouveau';
    const badgeClass = badge.includes('Pro') ? 'rep-pro' : badge.includes('Fiable') ? 'rep-trusted' : 'rep-new';
    setMain(`
      <button class="btn btn-ol btn-sm" onclick="showSection('collection')" style="margin-bottom:16px">← Retour</button>
      <div class="card" style="text-align:center;padding:32px;margin-bottom:20px">
        <div style="width:72px;height:72px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#fff;margin:0 auto 12px">${initials}</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem">${profile.username}</div>
        <span class="rep-badge ${badgeClass}" style="margin:8px auto;display:inline-flex">${badge}</span>
        <div style="display:flex;justify-content:center;gap:32px;margin-top:16px">
          <div style="text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--orange)">${exchanges||0}</div><div style="font-size:.72rem;color:var(--muted)">Échanges</div></div>
          <div style="text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--orange)">${avgRating||'—'}</div><div style="font-size:.72rem;color:var(--muted)">Note</div></div>
          <div style="text-align:center"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--orange)">${cards?.length||0}</div><div style="font-size:.72rem;color:var(--muted)">Cartes dispo</div></div>
        </div>
      </div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:14px">🃏 Cartes disponibles</div>
      ${cards?.length ? `
      <div class="coll-grid">
        ${cards.map(c => `
          <div class="coll-item" style="cursor:pointer" onclick="openCardLightbox('${c.img_url||''}','${c.img_back_url||''}','${c.name.replace(/'/g,'')}')">
            ${c.img_url ? `<img src="${c.img_url}" alt="${c.name}" loading="lazy">` : '<div style="aspect-ratio:3/4;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem">🃏</div>'}
            <div class="ci-name">${c.name}</div>
            <div class="ci-cond">${c.condition||''}</div>
            <div class="ci-sub">${c.lang||''}</div>
            ${c.img_back_url ? '<div style="font-size:.6rem;color:var(--green);font-weight:600">✅ R+V</div>' : ''}
          </div>`).join('')}
      </div>` : '<div class="empty"><div class="empty-icon">🃏</div>Aucune carte disponible pour le moment.</div>'}
    `);
  } catch(e) {
    setMain(`<div class="empty"><div class="empty-icon">⚠️</div>Erreur: ${e.message}</div>`);
  }
}

// ============ UTILS ============
function setMain(html) { document.getElementById('mainContent').innerHTML = html; }
function openModal() { document.getElementById('ov').classList.add('on'); }
function closeModal() { document.getElementById('ov').classList.remove('on'); }
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('tmsg').textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3400);
}
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return "A l'instant";
  if (diff < 3600) return Math.floor(diff/60) + 'min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'j';
}
async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
